name: test 

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: test the code
        uses:  actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        run: pip install pytest

      - name: run the test
        run: pytest
      
        
